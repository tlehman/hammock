name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            arch: arm64
            lib_ext: dylib
          - os: macos-13
            platform: macos
            arch: x86_64
            lib_ext: dylib
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            lib_ext: so
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build hammock
        run: nix develop --command make

      - name: Package tarball
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DIST="hammock-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "$DIST/libsci"
          cp hammock "$DIST/"
          cp "libsci/libsci.${{ matrix.lib_ext }}" "$DIST/libsci/"
          tar czf "${DIST}.tar.gz" "$DIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hammock-${{ matrix.platform }}-${{ matrix.arch }}
          path: hammock-*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from NEWS.md
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## Version / {
              if ($3 == ver) { cap = 1; next }
              if (cap) { exit }
            }
            cap { print }
          ' NEWS.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No NEWS.md entry for version $VERSION" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "v${VERSION}" dist/*.tar.gz \
            --title "Hammock ${VERSION}" \
            --notes-file RELEASE_NOTES.md
